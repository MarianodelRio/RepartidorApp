version: "3.8"

services:
  # ── Motor de rutas OSRM ─────────────────────────────────────
  osrm:
    image: osrm/osrm-backend
    container_name: osrm-posadas
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./osrm:/data
    command: osrm-routed --algorithm mld /data/posadas_editado.osrm
